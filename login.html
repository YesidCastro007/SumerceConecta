<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - SumerceConecta</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="login.css" />
</head>
<body>
  <section class="login-panel" id="loginPanel">
    <div class="button-container">
      <a class="login-button" onclick="showLoginForm()">🌾 Iniciar Sesión / Registrarse</a>
    </div>
    
    <div class="form-container" id="loginFormContainer">
      <h2>🌱 Bienvenido</h2>
      <div class="form-group">
        <label for="user-id">ID Identificación</label>
        <input type="text" id="user-id" placeholder="usuario123" required />
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="••••••••" required />
      </div>
      <button onclick="handleLogin()">Continuar</button>
    </div>
    
    <div class="form-container" id="profileFormContainer">
      <h2>¿Quién eres?</h2>
      <div class="profile-cards">
        <div class="profile-card" onclick="selectProfile('agricultor')">
          <div class="profile-icon">👨‍🌾</div>
          <h3>Agricultor</h3>
          <p>Vende tus productos directamente</p>
        </div>
        <div class="profile-card" onclick="selectProfile('comprador')">
          <div class="profile-icon">🛒</div>
          <h3>Comprador</h3>
          <p>Compra productos frescos del campo</p>
        </div>
        <div class="profile-card" onclick="selectProfile('movilidad')">
          <div class="profile-icon">🚚</div>
          <h3>Movilidad</h3>
          <p>Transporta productos agrícolas</p>
        </div>
      </div>
    </div>
  </section>

  <section class="form-container" id="farmerPanel">
    <h2>👨‍🌾 Registro Agricultor</h2>
    <div class="form-group">
      <label for="farmer-name">Nombre Completo</label>
      <input type="text" id="farmer-name" placeholder="Juan Pérez" required />
    </div>
    <div class="form-group">
      <label for="farmer-location">Ubicación</label>
      <input type="text" id="farmer-location" placeholder="Vereda El Rosal, Santander" required />
    </div>
    <div class="form-group">
      <label for="farmer-products">Productos que cultiva</label>
      <input type="text" id="farmer-products" placeholder="Café, Plátano, Yuca" required />
    </div>
    <button onclick="saveFarmer()">Registrar Agricultor</button>
  </section>

  <section class="form-container" id="buyerPanel">
    <h2>🛒 Registro Comprador</h2>
    <div class="form-group">
      <label for="buyer-name">Nombre Completo</label>
      <input type="text" id="buyer-name" placeholder="María González" required />
    </div>
    <div class="form-group">
      <label for="buyer-business">Nombre del Negocio</label>
      <input type="text" id="buyer-business" placeholder="Distribuidora El Campo" required />
    </div>
    <div class="form-group">
      <label for="buyer-location">Ubicación</label>
      <input type="text" id="buyer-location" placeholder="Bucaramanga, Santander" required />
    </div>
    <button onclick="saveBuyer()">Registrar Comprador</button>
  </section>

  <section class="form-container" id="mobilityPanel">
    <h2>🚚 Registro Movilidad</h2>
    <div class="form-group">
      <label for="mobility-name">Nombre Completo</label>
      <input type="text" id="mobility-name" placeholder="Carlos Rodríguez" required />
    </div>
    <div class="form-group">
      <label for="mobility-vehicle">Tipo de Vehículo</label>
      <input type="text" id="mobility-vehicle" placeholder="Camión 3.5 toneladas" required />
    </div>
    <div class="form-group">
      <label for="mobility-plate">Placa</label>
      <input type="text" id="mobility-plate" placeholder="ABC-123" required />
    </div>
    <button onclick="saveMobility()">Registrar Transportista</button>
  </section>

  <script src="login.js"></script>
</body>
</html>
