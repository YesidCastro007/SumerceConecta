
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - SumerceConecta</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="formulario.css" />
</head>
<body>
  <section class="login-panel" id="loginPanel">
    <div class="button-container" id="initialButton">
      <a class="login-button" onclick="showLoginForm()">🌾 Iniciar Sesión / Registrarse</a>
    </div>
    
    <div class="form-container" id="loginFormContainer">
      <h2>🌱 Bienvenido</h2>
      <div class="form-group">
        <label for="user-id">ID Identificación</label>
        <input type="text" id="user-id" placeholder="usuario123" required />
      </div>
      <div class="form-group">
        <label for="password">Contraseña</label>
        <input type="password" id="password" placeholder="••••••••" required />
      </div>
      <button onclick="handleLogin()">Continuar</button>
    </div>
    
    <div class="form-container" id="profileFormContainer">
      <h2>Selecciona tu rol</h2>
      <div class="profile-cards">
        <div class="profile-card" onclick="selectProfile('campesino')">
          <div class="profile-icon">👨🌾</div>
          <h3>Campesino</h3>
          <p>Vende tus productos directamente</p>
        </div>
        <div class="profile-card" onclick="selectProfile('consumidor')">
          <div class="profile-icon">🛒</div>
          <h3>Consumidor</h3>
          <p>Compra productos frescos del campo</p>
        </div>
        <div class="profile-card" onclick="selectProfile('transportador')">
          <div class="profile-icon">🚚</div>
          <h3>Transportador</h3>
          <p>Transporta productos agrícolas</p>
        </div>
      </div>
    </div>
  </section>
  <section class="form-container" id="campesinoPanel">
    <h2>👨🌾 Registro Campesino</h2>
    <div class="form-group">
      <label for="campesino-name">Nombre Completo</label>
      <input type="text" id="campesino-name" placeholder="Juan Pérez" required />
    </div>
    <div class="form-group">
      <label for="campesino-location">Ubicación</label>
      <input type="text" id="campesino-location" placeholder="Vereda El Rosal, Santander" required />
    </div>
    <div class="form-group">
      <label for="campesino-products">Productos que cultiva</label>
      <input type="text" id="campesino-products" placeholder="Café, Plátano, Yuca" required />
    </div>
    <button onclick="saveCampesino()">Registrar Campesino</button>
  </section>

  <section class="form-container" id="consumidorPanel">
    <h2>🛒 Registro Consumidor</h2>
    <div class="form-group">
      <label for="consumidor-name">Nombre Completo</label>
      <input type="text" id="consumidor-name" placeholder="María González" required />
    </div>
    <div class="form-group">
      <label for="consumidor-business">Nombre del Negocio</label>
      <input type="text" id="consumidor-business" placeholder="Distribuidora El Campo" required />
    </div>
    <div class="form-group">
      <label for="consumidor-location">Ubicación</label>
      <input type="text" id="consumidor-location" placeholder="Bucaramanga, Santander" required />
    </div>
    <button onclick="saveConsumidor()">Registrar Consumidor</button>
  </section>

  <section class="form-container" id="transportadorPanel">
    <h2>🚚 Registro Transportador</h2>
    <div class="form-group">
      <label for="transportador-name">Nombre Completo</label>
      <input type="text" id="transportador-name" placeholder="Carlos Rodríguez" required />
    </div>
    <div class="form-group">
      <label for="transportador-vehicle">Tipo de Vehículo</label>
      <input type="text" id="transportador-vehicle" placeholder="Camión 3.5 toneladas" required />
    </div>
    <div class="form-group">
      <label for="transportador-plate">Placa</label>
      <input type="text" id="transportador-plate" placeholder="ABC-123" required />
    </div>
    <button onclick="saveTransportador()">Registrar Transportador</button>
  </section>
  <script src="formulario.js"></script>
</body>
</html>
