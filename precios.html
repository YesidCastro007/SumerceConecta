<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Precios Diarios - SumerceConecta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="precios.css" />
</head>
<body>
    <div class="container">
        <h1>💰 Precios del Día</h1>
        <div class="date-display" id="dateDisplay"></div>
        
        <div class="controls">
            <select id="filterType" aria-label="Filtrar por tipo de producto">
                <option value="all">Todos los productos</option>
                <option value="fruta">Frutas</option>
                <option value="verdura">Verduras</option>
                <option value="insumo">Insumos</option>
            </select>
            <button id="updateButton" class="btn-update" onclick="toggleUpdateForm()">✏️ Actualizar Precios</button>
            <button id="speakButton">🔊 Escuchar Precios</button>
        </div>

        <div class="update-form" id="updateForm">
            <h3 style="color: #5a7c3e; margin-bottom: 1rem;">➕ Agregar/Actualizar Producto</h3>
            <div class="form-grid">
                <div class="form-group">
                    <label for="productName">Nombre del Producto</label>
                    <input type="text" id="productName" placeholder="Ej: Tomate" required />
                </div>
                <div class="form-group">
                    <label for="productType">Tipo</label>
                    <select id="productType" required>
                        <option value="fruta">Fruta</option>
                        <option value="verdura">Verdura</option>
                        <option value="insumo">Insumo</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="productPrice">Precio (COP)</label>
                    <input type="number" id="productPrice" placeholder="5000" required />
                </div>
                <div class="form-group">
                    <label for="productUnit">Unidad</label>
                    <input type="text" id="productUnit" placeholder="kg" required />
                </div>
            </div>
            <button onclick="addOrUpdateProduct()" style="width: 100%; margin-top: 1rem;">✔️ Guardar Producto</button>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>🌾 Producto</th>
                        <th>🏷️ Tipo</th>
                        <th>💵 Precio</th>
                        <th>📊 Unidad</th>
                    </tr>
                </thead>
                <tbody id="priceTableBody">
                </tbody>
            </table>
        </div>
    </div>

    <script src="precios.js"></script>
</body>
</html>
